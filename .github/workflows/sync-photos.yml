name: Sync photos from Nextcloud

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: npm ci

      - name: Sync and optimize photos
        run: npm run sync:photos
        env:
          NEXTCLOUD_HOST: ${{ secrets.NEXTCLOUD_HOST }}
          NEXTCLOUD_SHARE_TOKEN: ${{ secrets.NEXTCLOUD_SHARE_TOKEN }}

      - name: Commit updated assets
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: sync photos from Nextcloud'
          file_pattern: 'static/images/ src/lib/data/media.json'
