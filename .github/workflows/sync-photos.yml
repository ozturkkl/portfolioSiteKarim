name: Sync photos from Nextcloud

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Check required secrets
        env:
          NEXTCLOUD_HOST: ${{ secrets.NEXTCLOUD_HOST }}
          NEXTCLOUD_SHARE_TOKEN: ${{ secrets.NEXTCLOUD_SHARE_TOKEN }}
        run: |
          if [ -z "$NEXTCLOUD_HOST" ]; then
            echo "::error::Repository secret NEXTCLOUD_HOST is not set (Settings → Secrets and variables → Actions)."
            exit 1
          fi
          if [ -z "$NEXTCLOUD_SHARE_TOKEN" ]; then
            echo "::error::Repository secret NEXTCLOUD_SHARE_TOKEN is not set."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: npm ci

      - name: Sync and optimize photos
        run: npm run sync
        env:
          NEXTCLOUD_HOST: ${{ secrets.NEXTCLOUD_HOST }}
          NEXTCLOUD_SHARE_TOKEN: ${{ secrets.NEXTCLOUD_SHARE_TOKEN }}

      - name: Commit updated assets
        id: auto_commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: sync photos from Nextcloud'
          file_pattern: 'static/images/ src/lib/data/media.json'

      # GITHUB_TOKEN pushes do not trigger push workflows; dispatch deploy explicitly.
      - name: Trigger deploy
        if: steps.auto_commit.outputs.changes_detected == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-pages.yml',
              ref: 'main'
            })
